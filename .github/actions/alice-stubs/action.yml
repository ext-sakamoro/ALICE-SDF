name: 'ALICE-SDF Optional Bridge Stubs'
description: |
  Create empty stub crates for the optional path-dep bridges
  (alice-codec, alice-physics, libasp, alice-cache, alice-font)
  so that ALICE-SDF can resolve its workspace-relative path deps in CI.
  These crates are private to the local ALICE Eco-System and not on crates.io.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        # dir:crate-name pairs
        for entry in \
            ALICE-Physics:alice-physics \
            ALICE-Codec:alice-codec \
            ALICE-Streaming-Protocol:libasp \
            ALICE-Cache:alice-cache \
            ALICE-Font:alice-font; do
          dir="${entry%:*}"
          crate="${entry#*:}"
          mkdir -p "../${dir}/src"
          cat > "../${dir}/Cargo.toml" <<TOML
        [package]
        name = "${crate}"
        version = "0.1.0"
        edition = "2021"

        [lib]
        path = "src/lib.rs"
        TOML
          : > "../${dir}/src/lib.rs"
        done
        echo "Created stubs: alice-physics / alice-codec / libasp / alice-cache / alice-font"
