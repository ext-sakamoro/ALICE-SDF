name: Build Python wheels (release)

# tag push (v*) で発火。Linux x86_64 / Linux aarch64 / macOS arm64 / macOS x86_64 /
# Windows x86_64 の wheel を maturin で abi3-py310 ビルドし、対応する GitHub Release に
# 添付する。abi3 のため Python 3.10 / 3.11 / 3.12 / 3.13 が 1 wheel でカバーされる。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wheels:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            wheel-name: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            wheel-name: linux-aarch64
          - os: macos-14
            target: aarch64-apple-darwin
            wheel-name: macos-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            wheel-name: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            wheel-name: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Create ALICE optional bridge stubs
        uses: ./.github/actions/alice-stubs

      - name: Build wheel (manylinux)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python --interpreter 3.12
          manylinux: auto
          rust-toolchain: stable
          # manylinux Docker は workspace のみマウントするので、parent dir に
          # 置いた alice-stubs は不可視。container 内で再生成する。
          before-script-linux: |
            set -eu
            for entry in \
                ALICE-Physics:alice-physics \
                ALICE-Codec:alice-codec \
                ALICE-Streaming-Protocol:libasp \
                ALICE-Cache:alice-cache \
                ALICE-Font:alice-font; do
              dir="${entry%:*}"
              crate="${entry#*:}"
              mkdir -p "../${dir}/src"
              cat > "../${dir}/Cargo.toml" <<TOML
            [package]
            name = "${crate}"
            version = "0.1.0"
            edition = "2021"

            [lib]
            path = "src/lib.rs"
            TOML
              echo "// ALICE-SDF CI stub (wheel build)" > "../${dir}/src/lib.rs"
            done

      - name: Build wheel (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python --interpreter 3.12
          rust-toolchain: stable

      - name: List built wheels
        shell: bash
        run: ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.wheel-name }}
          path: dist/*.whl
          if-no-files-found: error

  attach-to-release:
    name: Attach wheels to GitHub Release
    needs: build-wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: wheels/
          pattern: wheels-*
          merge-multiple: true

      - name: List wheels
        shell: bash
        run: ls -lh wheels/

      - name: Attach wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: wheels/*.whl
          fail_on_unmatched_files: true
