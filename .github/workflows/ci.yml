name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 連続 push で前の run を即 cancel (runner minutes 浪費防止)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # 一過性 HTTP/2 framing layer 失敗対策 (本番 2026-06-06 Windows runner 実害)
  CARGO_NET_RETRY: "5"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # docs / mobile-only な PR でフル CI を回さないための paths-filter
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'benches/**'
              - 'examples/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
            mobile:
              - 'mobile/**'
            ci:
              - '.github/**'

  test:
    name: Test — ${{ matrix.name }}
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS (ARM64)
          - os: ubuntu-latest
            name: Linux (x86_64)
          - os: windows-latest
            name: Windows (x86_64)
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Create ALICE optional bridge stubs
        uses: ./.github/actions/alice-stubs

      # 主要ビルド (retry あり、本番 HTTP/2 errror 耐性)
      - name: Build (default)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: cargo build --lib

      - name: Test (core)
        run: cargo test --lib

      - name: Test (shader transpilers)
        continue-on-error: true
        run: cargo test --lib --features "glsl,hlsl,gpu"

      - name: Test (integration)
        run: cargo test --tests

      # doctest (= rustdoc 内 ```rust ブロック) は --lib / --tests では走らない
      # feedback_ci_errors_patterns B3: ``` 文字リテラル混入で doctest 落ちる罠予防
      - name: Test (doctests)
        run: cargo test --doc

      - name: Build (FFI + shaders)
        run: cargo build --features "ffi,hlsl,glsl"

      - name: Build (no default features) [T0]
        run: cargo build --lib --no-default-features

      - name: Build (JIT) [T3]
        run: cargo build --lib --no-default-features --features "jit"

      - name: Build (codec / asp / sdf-cache bridges) [T3]
        # physics は別 job で実 ALICE-Physics 経由で厳格化、それ以外の bridge はスタブ依存のため continue
        run: cargo build --lib --no-default-features --features "codec,asp,sdf-cache"
        continue-on-error: true

      - name: Build (Unity meta) [T2]
        run: cargo build --lib --no-default-features --features "unity"
        continue-on-error: true

      - name: Build (Unreal meta) [T2]
        run: cargo build --lib --no-default-features --features "unreal"
        continue-on-error: true

      - name: Test (AAA meta) [T4]
        run: cargo test --lib --no-default-features --features "aaa"
        continue-on-error: true

      - name: Benchmark compilation check
        run: cargo bench --no-run

  wasm:
    name: WebAssembly (wasm32) cross-compile
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/alice-stubs
      - name: Build (wasm feature, wasm32 target)
        run: cargo build --lib --no-default-features --features wasm --target wasm32-unknown-unknown
      - name: Test wasm (host, lib-only)
        run: cargo build --lib --no-default-features --features wasm

  openvdb:
    name: OpenVDB I/O
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/alice-stubs
      - name: Build (openvdb feature)
        run: cargo build --lib --no-default-features --features openvdb
      - name: Test (openvdb feature)
        run: cargo test --lib --no-default-features --features openvdb vdb

  bevy:
    name: Bevy plugin (bindings/bevy/alice-sdf-bevy)
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/bevy/alice-sdf-bevy
      - name: Install bevy build deps (Linux)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Build (lib)
        working-directory: bindings/bevy/alice-sdf-bevy
        run: cargo build --lib
      - name: Test (lib)
        working-directory: bindings/bevy/alice-sdf-bevy
        run: cargo test --lib

  physics:
    name: Bridge — ALICE-Physics (strict)
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ALICE-SDF
        uses: actions/checkout@v4
        with:
          path: ALICE-SDF

      - name: Checkout ALICE-Physics (path dep target)
        uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Physics
          path: ALICE-Physics

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ALICE-SDF

      # alice-physics は実 clone、他の optional path dep (alice-codec/cache/font/libasp) は stub
      # cargo は feature OFF でも path 存在を resolution 時に検証するため stub 必須
      - name: Create non-physics bridge stubs
        working-directory: ALICE-SDF
        shell: bash
        run: |
          set -euo pipefail
          for entry in \
              ALICE-Codec:alice-codec \
              ALICE-Streaming-Protocol:libasp \
              ALICE-Cache:alice-cache \
              ALICE-Font:alice-font; do
            dir="${entry%:*}"
            crate="${entry#*:}"
            mkdir -p "../${dir}/src"
            cat > "../${dir}/Cargo.toml" <<TOML
          [package]
          name = "${crate}"
          version = "0.1.0"
          edition = "2021"
          [lib]
          path = "src/lib.rs"
          TOML
            : > "../${dir}/src/lib.rs"
          done

      - name: Build (physics, strict)
        working-directory: ALICE-SDF
        run: cargo build --lib --no-default-features --features "physics"

      - name: Test (physics, strict)
        working-directory: ALICE-SDF
        run: cargo test --lib --no-default-features --features "physics"

  mobile:
    name: Mobile — iOS / Android cross-compile
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            mobile/uniffi-wrapper

      - name: Add mobile rustup targets
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Install Android NDK (cached by setup-java)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Build host (lib + uniffi-bindgen binary)
        working-directory: mobile/uniffi-wrapper
        run: cargo build --release

      - name: Build iOS aarch64 (device)
        working-directory: mobile/uniffi-wrapper
        run: cargo build --release --target aarch64-apple-ios

      - name: Build iOS aarch64 (sim)
        working-directory: mobile/uniffi-wrapper
        run: cargo build --release --target aarch64-apple-ios-sim

      - name: Build iOS x86_64 (sim, Intel Mac)
        working-directory: mobile/uniffi-wrapper
        run: cargo build --release --target x86_64-apple-ios

      - name: Build iOS aarch64 with gpu (Metal backend)
        working-directory: mobile/uniffi-wrapper
        run: cargo build --release --target aarch64-apple-ios --features gpu

      - name: Build Android 4 ABIs
        working-directory: mobile/uniffi-wrapper
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 \
            build --lib --release

      - name: Verify Swift bindings generate clean
        working-directory: mobile/uniffi-wrapper
        run: |
          cargo run --release --bin uniffi-bindgen -- \
            generate src/alice_sdf.udl \
            --language swift \
            --out-dir /tmp/ci-swift

      - name: Verify Kotlin bindings generate clean
        working-directory: mobile/uniffi-wrapper
        run: |
          cargo run --release --bin uniffi-bindgen -- \
            generate src/alice_sdf.udl \
            --language kotlin \
            --out-dir /tmp/ci-kotlin

      # Integration tests over the 12 publicly-exported wrapper functions.
      # Release プロファイルは `panic = "abort"` のため integration test の
      # 動的 unwind との互換が取れない → debug プロファイルで実行する。
      - name: Run integration tests (debug)
        working-directory: mobile/uniffi-wrapper
        run: cargo test --tests

  clippy:
    name: Clippy (core strict, -D warnings)
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Create ALICE optional bridge stubs
        uses: ./.github/actions/alice-stubs

      # core src/** は strict (-D warnings)。v1.7.2 で informational から格上げ。
      # 新しい clippy lint (Rust リリース毎に追加される) が混入したら CI で即発覚させる。
      - name: Clippy strict (no-default-features)
        run: cargo clippy --lib --no-default-features
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Clippy strict (glsl + hlsl + gpu)
        run: cargo clippy --lib --features "glsl,hlsl,gpu"
        env:
          RUSTFLAGS: "-Dwarnings"

  clippy-strict:
    name: Clippy strict (mobile wrapper, includes alice-sdf path dep)
    needs: changes
    # mobile/uniffi-wrapper は alice-sdf core を path dep として再 clippy する。
    # core (src/**) 変更時にも厳格化を効かせるため code もトリガに含める。
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.mobile == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mobile/uniffi-wrapper

      # 新規 mobile/ クレートは厳格 (-D warnings)
      - name: Clippy strict (mobile/uniffi-wrapper)
        working-directory: mobile/uniffi-wrapper
        env:
          RUSTFLAGS: "-Dwarnings"
        run: cargo clippy --lib --all-targets

  fmt:
    name: Format
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.mobile == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting (core)
        run: cargo fmt --check

      - name: Check formatting (mobile/uniffi-wrapper)
        working-directory: mobile/uniffi-wrapper
        run: cargo fmt --check

  doc:
    name: Doc (RUSTDOCFLAGS=-Dwarnings)
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Create ALICE optional bridge stubs
        uses: ./.github/actions/alice-stubs

      # karikari-review 推奨: rustdoc warning (broken link / missing example 等) を CI で deny
      - name: cargo doc (core, no-deps)
        run: cargo doc --lib --no-deps
        env:
          RUSTDOCFLAGS: "-Dwarnings"

  actionlint:
    name: actionlint (workflow YAML 検証)
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # feedback_workflow_yaml_pitfall: `run:` 末尾 `::` で 0 秒 failure 等の罠を予防
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

  server-smoke:
    name: REST server smoke test
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Create ALICE optional bridge stubs
        uses: ./.github/actions/alice-stubs

      - name: Build server
        working-directory: server
        run: cargo build --release

      - name: Start server in background
        working-directory: server
        run: |
          ./target/release/alice-sdf-server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          sleep 2

      - name: Smoke /version
        run: |
          curl -fsS http://localhost:8787/version | grep -q "alice-sdf-server"

      - name: Smoke /eval (sphere)
        run: |
          RESULT=$(curl -fsS -X POST http://localhost:8787/eval \
            -H 'Content-Type: application/json' \
            -d '{"shape":"sphere","point":[2.0,0,0],"params":{"radius":1.0}}')
          echo "Response: $RESULT"
          echo "$RESULT" | grep -q '"distance":1'

      - name: Smoke /op (smooth_union)
        run: |
          RESULT=$(curl -fsS -X POST http://localhost:8787/op \
            -H 'Content-Type: application/json' \
            -d '{"op":"smooth_union","a":0.3,"b":-0.2,"k":0.1}')
          echo "Response: $RESULT"
          echo "$RESULT" | grep -q '"distance"'

      - name: Smoke /mesh (sphere, res=16)
        run: |
          RESULT=$(curl -fsS -X POST http://localhost:8787/mesh \
            -H 'Content-Type: application/json' \
            -d '{"shape":"sphere","params":{"radius":1.0},"resolution":16}')
          echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['vertex_count']>100, d"

      - name: Smoke /splat (sphere, res=12)
        run: |
          RESULT=$(curl -fsS -X POST http://localhost:8787/splat \
            -H 'Content-Type: application/json' \
            -d '{"shape":"sphere","params":{"radius":0.5},"resolution":12}')
          echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['splat_count']>0, d"

      - name: Smoke /vox (sphere, size=12)
        run: |
          RESULT=$(curl -fsS -X POST http://localhost:8787/vox \
            -H 'Content-Type: application/json' \
            -d '{"shape":"sphere","params":{"radius":0.5},"size":12}')
          echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['voxel_count']>0 and d['size']==[12,12,12], d"

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi

  wasm-build:
    name: WASM bindings build
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Create ALICE optional bridge stubs
        uses: ./.github/actions/alice-stubs

      - name: Build wasm
        run: cargo build --release --target wasm32-unknown-unknown --features wasm --no-default-features

      - name: Verify wasm artifact exists
        run: |
          test -f target/wasm32-unknown-unknown/release/alice_sdf.wasm
          ls -lh target/wasm32-unknown-unknown/release/alice_sdf.wasm

  threejs-typecheck:
    name: Three.js TypeScript type-check
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: bindings/threejs
        run: |
          if [ -f package.json ]; then
            npm install --no-fund --no-audit
          else
            echo "::warning::no package.json — skipping"
            exit 0
          fi

      - name: TypeScript build
        working-directory: bindings/threejs
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi

  mobile-sample-build:
    name: Mobile sample compile (iOS + Android)
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build iOS sample (compile-only via xcodebuild)
        working-directory: mobile/samples/ios-swiftui
        run: |
          if [ -f project.yml ] && command -v xcodegen >/dev/null 2>&1; then
            xcodegen generate
          fi
          XCPROJ=$(find . -maxdepth 1 -name "*.xcodeproj" -print -quit)
          if [ -n "$XCPROJ" ]; then
            SCHEME=$(basename "$XCPROJ" .xcodeproj)
            xcodebuild -project "$XCPROJ" \
              -scheme "$SCHEME" \
              -destination 'generic/platform=iOS Simulator' \
              -configuration Debug \
              build-for-testing \
              CODE_SIGNING_ALLOWED=NO || echo "::warning::iOS sample build failed"
          else
            echo "::warning::no .xcodeproj in mobile/samples/ios-swiftui — skipping"
          fi

      - name: Build Android sample (compile-only via gradle)
        working-directory: mobile/samples/android-compose
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon || echo "::warning::Android sample build skipped (gradlew failed)"
          else
            echo "::warning::no gradlew in mobile/samples/android-compose — skipping"
          fi
