name: AliceSDFDemo
options:
  bundleIdPrefix: net.alicelaw
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

targets:
  AliceSDFDemo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AliceSDFDemo
    dependencies:
      - framework: ../../uniffi-wrapper/target/xcframework/AliceSDF.xcframework
        embed: false
    info:
      path: AliceSDFDemo/Info.plist
      properties:
        CFBundleDisplayName: "ALICE-SDF Demo"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.alicelaw.AliceSDFDemo
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_BITCODE: "NO"
        # Bridging Header — alice_sdfFFI.h を Swift 側に直接 bridge
        SWIFT_OBJC_BRIDGING_HEADER: "AliceSDFDemo/AliceSDFDemo-Bridging-Header.h"
        # XCFramework の Headers/ を C プリプロセッサの探索パスに追加
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../../uniffi-wrapper/target/xcframework/AliceSDF.xcframework/ios-arm64/Headers"
          - "$(SRCROOT)/../../uniffi-wrapper/target/xcframework/AliceSDF.xcframework/ios-arm64_x86_64-simulator/Headers"

schemes:
  AliceSDFDemo:
    build:
      targets:
        AliceSDFDemo: all
    run:
      config: Debug
